<script>
// ====================== SECURE VERSION ======================
const PROXY_BASE = '/.netlify/functions/tmdb';
const IMG = 'https://image.tmdb.org/t/p/w300';
const BIG = 'https://image.tmdb.org/t/p/original';
const FALL = 'https://via.placeholder.com/300x450/111/222?text=?';

const GENRES={28:'Actie',12:'Avontuur',16:'Animatie',35:'Komedie',80:'Misdaad',99:'Documentaire',18:'Drama',10751:'Familie',14:'Fantasy',36:'Geschiedenis',27:'Horror',9648:'Mysterie',10749:'Romantiek',878:'Sci-Fi',53:'Thriller',10752:'Oorlog',10759:'Actie & Avontuur',10765:'Sci-Fi & Fantasy'};
const LABELS={movie:'Films',tv:'Series',anime:'Anime'};
const SOURCES=[
  {name:'Bron 1',movie:id=>`https://www.2embed.cc/embed/${id}`,tv:(id,s,e)=>`https://www.2embed.cc/embedtv/${id}&s=${s}&e=${e}`},
  {name:'Bron 2',movie:id=>`https://vidsrc.to/embed/movie/${id}`,tv:(id,s,e)=>`https://vidsrc.to/embed/tv/${id}/${s}/${e}`},
  {name:'Bron 3',movie:id=>`https://multiembed.mov/?video_id=${id}&tmdb=1`,tv:(id,s,e)=>`https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`},
];

let mode='movie',heroItem=null,heroType='movie',stm=null;
let deviceId=localStorage.getItem('cinexo_device_id')||generateDeviceId();
let currentPlay=null,currentSourceIdx=0;

function generateDeviceId(){
  const id='device_'+Date.now()+'_'+Math.random().toString(36).substr(2,9);
  localStorage.setItem('cinexo_device_id',id);
  return id;
}

function lsKey(base){return `cinexo_${base}_${deviceId}`;}
function getList(base){try{return JSON.parse(localStorage.getItem(lsKey(base))||'[]');}catch(e){return [];}}
function setList(base,arr){localStorage.setItem(lsKey(base),JSON.stringify(arr));}

function isFav(id,type){return getList('list').some(x=>x.id===id&&x.type===type);}
function toggleFav(id,type,title,poster){
  let list=getList('list');
  const idx=list.findIndex(x=>x.id===id&&x.type===type);
  if(idx>-1)list.splice(idx,1);else list.unshift({id,type,title,poster});
  setList('list',list);
  renderPersonalRows();
  refreshDetailFav(id,type);
}
function pushContinue(id,type,title,poster,season,episode){
  let list=getList('continue').filter(x=>!(x.id===id&&x.type===type));
  list.unshift({id,type,title,poster,season:season||null,episode:episode||null,ts:Date.now()});
  setList('continue',list.slice(0,20));
  renderPersonalRows();
}
function renderSimpleRow(wrapId,elId,items){
  const wrap=document.getElementById(wrapId),el=document.getElementById(elId);
  if(!items.length){wrap.style.display='none';return;}
  wrap.style.display='';
  el.innerHTML=items.map(i=>{
    const sub=i.season?`S${i.season} &middot; E${i.episode}`:'';
    return `<div class="mc" onclick='playItem(${i.id},"${(i.title||'').replace(/"/g,'&quot;')}","${i.type}","${i.poster}",${i.season||'null'},${i.episode||'null'})'>
      <img src="${i.poster}" loading="lazy" onerror="this.src='${FALL}'" alt="${i.title}">
      <div class="mc-ov"><div class="mc-t">${i.title}</div>${sub?`<div class="mc-y">${sub}</div>`:''}</div>
    </div>`;
  }).join('');
}
function renderPersonalRows(){
  renderSimpleRow('continue-wrap','r-continue',getList('continue'));
  renderSimpleRow('mylist-wrap','r-mylist',getList('list'));
}

// SECURE PROXY API CALL
async function api(p,q={}){
  try {
    const params = new URLSearchParams({language:'nl-NL', ...q});
    const url = `${PROXY_BASE}${p.startsWith('/') ? p : '/' + p}?${params}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('API error');
    return await res.json();
  } catch(e){
    console.error(e);
    return {results:[]};
  }
}

function skeletonRow(n){return Array.from({length:n||8}).map(()=>`<div class="mc skel"></div>`).join('');}

window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('solid',scrollY>60));
document.addEventListener('keydown',e=>{
  if(e.key!=='Escape')return;
  if(document.getElementById('pv').classList.contains('open'))closePV();
  else if(document.getElementById('dm').classList.contains('open'))closeDetail();
  else if(document.getElementById('sp').classList.contains('open'))closeSearch();
  else if(document.getElementById('ai-panel').classList.contains('open'))closeAiChat();
  else if(document.getElementById('sidebar').classList.contains('open'))closeMenu();
});

function toggleMenu(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('open');}
function closeMenu(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open');}
function setMode(m,el){closeMenu();mode=m;document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));el.classList.add('active');document.getElementById('mode-pill').textContent=LABELS[m];clearFilter();showWatch();}
function openSearch(){document.getElementById('sp').classList.add('open');setTimeout(()=>document.getElementById('sp-q').focus(),50);}
function closeSearch(){document.getElementById('sp').classList.remove('open');document.getElementById('sp-q').value='';document.getElementById('sp-res').innerHTML='';}

async function doSearch(q){
  clearTimeout(stm);if(!q.trim()){document.getElementById('sp-res').innerHTML='';return;}
  document.getElementById('sp-res').innerHTML=skeletonRow(10);
  stm=setTimeout(async()=>{
    let results=[];
    if(mode==='anime'){
      const res=((await api('search/tv',{query:q,include_adult:'false'})).results||[]);
      results=res.filter(r=>r.genre_ids?.includes(16)).map(r=>({...r,_type:'tv'}));
    }else{
      const[mv,tv]=await Promise.all([
        api('search/movie',{query:q,include_adult:'false'}),
        api('search/tv',{query:q,include_adult:'false'})
      ]);
      results=[...(mv.results||[]).map(r=>({...r,_type:'movie'})),...(tv.results||[]).map(r=>({...r,_type:'tv'}))];
      results.sort((a,b)=>(b.popularity||0)-(a.popularity||0));
    }
    document.getElementById('sp-res').innerHTML=results.slice(0,24).map(i=>{
      const tt=i.title||i.name||'',pt=i.poster_path?IMG+i.poster_path:FALL,ty=i._type;
      return `<div class="mc" style="flex:unset" onclick='playItem(${i.id},"${tt.replace(/"/g,'&quot;')}","${ty}","${pt}")'>
        <span class="mc-type">${ty==='tv'?'Serie':'Film'}</span>
        <img src="${pt}" loading="lazy" onerror="this.src='${FALL}'" alt="${tt}">
        <div class="mc-ov"><div class="mc-icons"><button class="mc-icon" onclick='event.stopPropagation();openDetail(${i.id},"${ty}")'>&#8505;</button></div><div class="mc-t">${tt}</div></div>
      </div>`;
    }).join('');
  },280);
}

function showWatch(){document.getElementById('wv').style.display='block';document.getElementById('h-type').textContent=LABELS[mode]||'';loadHome();}
function goHome(){closePV();closeSearch();closeDetail();showWatch();}
