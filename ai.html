<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn AI Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #18181b; color: #f4f4f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        #chat-container { width: 100%; max-width: 800px; background: #27272a; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; height: 85vh; overflow: hidden; border: 1px solid #3f3f46; }
        header { background: #3f3f46; padding: 15px 20px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #52525b; text-align: center; color: #38bdf8; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 1rem; word-break: break-word; }
        .user { background: #0284c7; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #3f3f46; color: #f4f4f5; align-self: flex-start; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        .error { background: #7f1d1d; color: #fca5a5; align-self: center; text-align: center; font-size: 0.9rem; }
        #input-area { display: flex; padding: 15px; background: #202023; border-top: 1px solid #3f3f46; gap: 10px; }
        input { flex: 1; padding: 12px 16px; background: #18181b; color: #fff; border: 1px solid #3f3f46; border-radius: 6px; font-size: 1rem; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { padding: 12px 24px; background: #0284c7; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
        button:hover { background: #0369a1; }
    </style>
</head>
<body>

<div id="chat-container">
    <header>🤖 Qwen 2.5 Live Tunnel</header>
    <div id="messages">
        <div class="message ai"><b>Bot:</b> Hoi! Ik ben verbonden met je laptop thuis. Wat kan ik vandaag voor je programmeren of uitzoeken?</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Typ je bericht of codevraag..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Verzend</button>
    </div>
</div>

<script>
    // Jouw actieve Ngrok link staat hier al direct in ingebouwd!
    const NGROK_URL = "https://prescribe-unseeing-transpose.ngrok-free.dev"; 
    
    // De array die het volledige gesprek onthoudt (het geheugen)
    let chatHistory = [
        { role: "system", content: "You are a helpful AI assistant that provides full code blocks, website layouts, and detailed answers without clipping text." }
    ];

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.strip ? input.value.strip() : input.value.trim();
        if (!text) return;

        const messagesDiv = document.getElementById("messages");
        
        // 1. Voeg jouw bericht toe aan het scherm
        messagesDiv.innerHTML += `<div class="message user"><b>Jij:</b> ${text}</div>`;
        input.value = "";
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        // 2. Voeg jouw vraag toe aan het AI-geheugen
        chatHistory.push({ role: "user", content: text });

        // 3. Toon een tijdelijk "aan het typen..." bericht
        const loadingId = "loading-" + Date.now();
        messagesDiv.innerHTML += `<div class="message ai" id="${loadingId}"><b>Bot:</b> Aan het nadenken...</div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        try {
            // We sturen de complete geschiedenis naar je laptop thuis
            const response = await fetch(`${NGROK_URL}/api/chat`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "qwen2.5",
                    messages: chatHistory,
                    stream: false
                })
            });

            if (!response.ok) throw new Error("Netwerk-respons was niet ok");

            const data = await response.json();
            const aiReply = data.message.content;

            // Verwijder het laadbericht en toon het echte antwoord
            document.getElementById(loadingId).remove();
            messagesDiv.innerHTML += `<div class="message ai"><b>Bot:</b> ${aiReply}</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // 4. Voeg het antwoord toe aan het geheugen voor de volgende vraag
            chatHistory.push({ role: "assistant", content: aiReply });

        } catch (error) {
            document.getElementById(loadingId).remove();
            messagesDiv.innerHTML += `<div class="message error"><b>Systeemfout:</b> Kon geen verbinding maken met je laptop thuis. Controleer of je CMD-scherm met Ngrok nog openstaat.</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    }
</script>

</body>
</html>
